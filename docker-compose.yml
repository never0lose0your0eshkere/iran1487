version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: subscription_monitor_db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: subscription_monitor
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: subscription_monitor_backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/subscription_monitor?authSource=admin
      - JWT_SECRET=your_super_secret_jwt_key_change_this
      - JWT_REFRESH_SECRET=your_super_secret_refresh_key_change_this
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app
      - /app/node_modules

  web:
    build: ./web
    container_name: subscription_monitor_web
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  mongo_data: